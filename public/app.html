<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeadLion — Local Business Lead Finder</title>
  <meta name="description" content="Find, score and close local business leads. GMB audits, branded reports and outreach in one click.">
  <link rel="icon" href="/logo.png">
  <link rel="apple-touch-icon" href="/logo.png">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0e1116">
  <meta name="mobile-web-app-capable" content="yes">

      <nav>
        <a href="#/dashboard" data-nav="dashboard">📊 Dashboard</a>

        <div id="storage-badge" class="badge badge-muted">Local storage</div>
      </div>
    </aside>
    <main id="main"></main>

  <div id="modal-root"></div>

  <script type="module" src="/app.js"></script>
