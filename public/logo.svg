<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LeadLion">
  <defs>
    <linearGradient id="mane" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="maneBack" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#b45309"/>
      <stop offset="1" stop-color="#7c2d12"/>
    </linearGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="1" stop-color="#fcd34d"/>
    </linearGradient>
  </defs>

  <!-- back mane layer (rotated half-step for depth) -->
  <g transform="rotate(15.0 32 30)">
    <path d="M27.47,13.11 Q31.64,4.65 36.39,2.79 Q38.15,12.51 36.53,13.11 Q44.05,8.43 48.96,9.18 Q46.07,17.93 44.37,17.63 Q51.90,18.13 55.54,21.04 Q50.22,26.58 48.89,25.47 Q56.33,29.65 58.11,34.21 Q49.49,36.15 48.89,34.53 Q53.80,42.17 53.04,47.14 Q44.07,44.07 44.37,42.37 Q44.16,50.39 41.18,54.12 Q35.42,48.22 36.53,46.89 Q32.39,57.24 27.28,59.23 Q25.85,47.49 27.47,46.89 Q19.07,53.15 13.80,52.34 Q17.93,42.07 19.63,42.37 Q12.81,41.45 9.30,38.64 Q13.78,33.42 15.11,34.53 Q8.09,30.34 6.34,25.86 Q14.51,23.85 15.11,25.47 Q8.82,17.05 9.63,11.77 Q19.93,15.93 19.63,17.63 Q21.01,11.57 23.71,8.20 Q28.58,11.78 27.47,13.11 Z" fill="url(#maneBack)"/>
  </g>
  <!-- main mane -->
  <path d="M27.73,14.06 Q31.66,6.08 36.14,4.33 Q37.80,13.50 36.27,14.06 Q43.37,9.65 48.00,10.36 Q45.27,18.61 43.67,18.33 Q50.77,18.80 54.20,21.55 Q49.19,26.77 47.94,25.73 Q54.96,29.67 56.64,33.98 Q48.50,35.80 47.94,34.27 Q52.56,41.48 51.85,46.17 Q43.39,43.27 43.67,41.67 Q43.47,49.23 40.66,52.75 Q35.23,47.19 36.27,45.94 Q32.36,55.01 27.67,56.84 Q26.20,46.50 27.73,45.94 Q19.80,51.84 14.83,51.08 Q18.73,41.39 20.33,41.67 Q13.90,40.80 10.59,38.15 Q14.81,33.23 16.06,34.27 Q9.44,30.32 7.79,26.09 Q15.50,24.20 16.06,25.73 Q10.13,17.79 10.89,12.81 Q20.61,16.73 20.33,18.33 Q21.63,12.62 24.18,9.44 Q28.77,12.81 27.73,14.06 Z" fill="url(#mane)"/>

  <!-- face -->
  <path d="M32 17.2
           C39.2 17.2 44.4 22.2 44.4 29.2
           C44.4 36.8 39 42.6 32 42.6
           C25 42.6 19.6 36.8 19.6 29.2
           C19.6 22.2 24.8 17.2 32 17.2 Z" fill="url(#face)"/>

  <!-- soft muzzle (single, low-contrast — no clown cheeks) -->
  <ellipse cx="32" cy="37.2" rx="6.6" ry="4.8" fill="#fffbeb" opacity="0.55"/>

  <!-- eyes (fierce, angled almond) -->
  <g fill="#2e2011">
    <ellipse cx="27.4" cy="29.0" rx="2.8" ry="1.95" transform="rotate(17 27.4 29.0)"/>
    <ellipse cx="36.6" cy="29.0" rx="2.8" ry="1.95" transform="rotate(-17 36.6 29.0)"/>
  </g>
  <circle cx="27.8" cy="28.4" r="0.5" fill="#fff"/>
  <circle cx="37.2" cy="28.4" r="0.5" fill="#fff"/>

  <!-- brows angled down toward center (fierce, not arched) -->
  <path d="M23.7 24.4 L30.5 27.2" stroke="#3b2410" stroke-width="2.1" fill="none" stroke-linecap="round"/>
  <path d="M40.3 24.4 L33.5 27.2" stroke="#3b2410" stroke-width="2.1" fill="none" stroke-linecap="round"/>

  <!-- nose: dark lion muzzle, shaped as a map pin (subtle local-leads nod) -->
  <path d="M32 31.4 C30.4 31.4 29.3 32.4 29.3 33.7 C29.3 35.4 32 37.9 32 37.9 C32 37.9 34.7 35.4 34.7 33.7 C34.7 32.4 33.6 31.4 32 31.4 Z" fill="#3b2410"/>
  <ellipse cx="32" cy="33.5" rx="1.5" ry="1.1" fill="#1f1409"/>

  <!-- mouth (natural lion muzzle line) -->
  <path d="M32 37.9 L32 39.3" stroke="#6b4423" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M32 39.3 Q29.9 40.7 28.2 39.9" stroke="#6b4423" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M32 39.3 Q34.1 40.7 35.8 39.9" stroke="#6b4423" stroke-width="1.2" fill="none" stroke-linecap="round"/>
</svg>
