<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="LeadLion">
  <defs>
    <linearGradient id="ll-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="ll-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c2330"/>
      <stop offset="1" stop-color="#0e1116"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#ll-tile)"/>
  <!-- mane: ring of rounded points -->
  <g fill="url(#ll-gold)">
    <circle cx="45" cy="31" r="8"/>
    <circle cx="41.2" cy="40.2" r="8"/>
    <circle cx="32" cy="44" r="8"/>
    <circle cx="22.8" cy="40.2" r="8"/>
    <circle cx="19" cy="31" r="8"/>
    <circle cx="22.8" cy="21.8" r="8"/>
    <circle cx="32" cy="18" r="8"/>
    <circle cx="41.2" cy="21.8" r="8"/>
  </g>
  <!-- ears -->
  <circle cx="24" cy="21" r="4.5" fill="url(#ll-gold)"/>
  <circle cx="40" cy="21" r="4.5" fill="url(#ll-gold)"/>
  <!-- face -->
  <circle cx="32" cy="31" r="13" fill="#fef3c7"/>
  <!-- eyes -->
  <circle cx="27" cy="29.5" r="2.1" fill="#1a1205"/>
  <circle cx="37" cy="29.5" r="2.1" fill="#1a1205"/>
  <!-- muzzle -->
  <path d="M32 33.5 L35.5 37 Q32 40 28.5 37 Z" fill="#d97706"/>
  <path d="M32 37 V40" stroke="#b45309" stroke-width="1.4" stroke-linecap="round"/>
</svg>
