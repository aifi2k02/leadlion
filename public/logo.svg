  <circle cx="32" cy="33.8" r="1.1" fill="#fef3c7"/>

  <!-- mouth -->
  <path d="M32 39.2 Q29.6 41.4 27.4 40.3" stroke="#78350f" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M32 39.2 Q34.4 41.4 36.6 40.3" stroke="#78350f" stroke-width="1.5" fill="none" stroke-linecap="round"/>

